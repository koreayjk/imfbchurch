<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Supabase 데이터 이전 도구 (imbaptist.org)</title>
<style>
  body{font-family:system-ui,-apple-system,'Apple SD Gothic Neo',sans-serif;max-width:760px;margin:40px auto;padding:0 20px;color:#1a1a1a;line-height:1.6}
  h1{font-size:22px}
  .box{background:#f6f7f9;border:1px solid #e2e5ea;border-radius:12px;padding:18px 20px;margin:18px 0}
  .warn{background:#fff6e5;border-color:#ffd98a}
  button{background:#2563eb;color:#fff;border:0;border-radius:10px;padding:14px 28px;font-size:16px;font-weight:600;cursor:pointer}
  button:disabled{background:#9bb4e6;cursor:not-allowed}
  #log{background:#0f172a;color:#cbd5e1;font-family:ui-monospace,monospace;font-size:13px;padding:16px;border-radius:10px;height:340px;overflow:auto;white-space:pre-wrap;margin-top:18px}
  .ok{color:#4ade80}.err{color:#f87171}.muted{color:#94a3b8}
</style>
</head>
<body>
<h1>🔄 Supabase 데이터 이전 도구</h1>
<p>기존 수퍼베이스의 모든 데이터(테이블 내용 + 업로드된 이미지)를 새 수퍼베이스로 한 번에 옮깁니다.</p>

<div class="box warn">
  <b>실행 전 확인</b><br>
  1. 새 수퍼베이스에서 <code>supabase-setup.sql</code> 을 이미 실행했어야 합니다. (테이블/버킷 생성)<br>
  2. 이 페이지를 <b>브라우저에서 직접 열어</b> 실행하세요. (예: 파일 더블클릭)<br>
  3. 여러 번 눌러도 안전합니다(덮어쓰기). 끝난 뒤 새 수퍼베이스 테이블을 확인하세요.
</div>

<button id="go" onclick="run()">데이터 이전 시작 ▶</button>

<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── 기존(옛) 수퍼베이스 ──
const OLD = window.supabase.createClient(
  'https://slwwzrtvizfxyvugyxgc.supabase.co',
  'sb_publishable_UgeXbVXjHFvccavcMiinag_jYJX3Axu'
);
const OLD_BUCKET = 'church-images';

// ── 새 수퍼베이스 ──
const NEW = window.supabase.createClient(
  'https://illbgsjvhsciougzjgwn.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsbGJnc2p2aHNjaW91Z3pqZ3duIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzM4NDUsImV4cCI6MjA5MDY0OTg0NX0.TrBlbpyXoMlwwBZUjbeC-Li6XcDAMeGgfNWGRmSyOR4'
);
const NEW_BUCKET = 'imfb-church-images';

const logEl = document.getElementById('log');
function log(msg, cls){ const d=document.createElement('div'); if(cls)d.className=cls; d.textContent=msg; logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight; }

// 옛 버킷의 이미지 URL을 새 버킷으로 복사하고 새 URL을 돌려준다
const MARKER = '/object/public/' + OLD_BUCKET + '/';
async function migrateImageUrl(oldUrl){
  if(typeof oldUrl !== 'string') return oldUrl;
  const idx = oldUrl.indexOf(MARKER);
  if(idx === -1) return oldUrl;                 // 옛 버킷 URL이 아니면 그대로
  const path = oldUrl.substring(idx + MARKER.length);
  const resp = await fetch(oldUrl);
  if(!resp.ok) throw new Error('이미지 다운로드 실패: '+oldUrl);
  const blob = await resp.blob();
  const {error} = await NEW.storage.from(NEW_BUCKET).upload(path, blob, {upsert:true, contentType: blob.type});
  if(error) throw error;
  const {data} = NEW.storage.from(NEW_BUCKET).getPublicUrl(path);
  log('   🖼  이미지 복사: '+path, 'muted');
  return data.publicUrl;
}
// urls 컬럼(JSON 배열 문자열)을 받아 모든 이미지 옮기고 새 JSON 문자열 반환
async function migrateUrlsJson(urlsStr){
  let arr; try{ arr = JSON.parse(urlsStr||'[]'); }catch(e){ arr = []; }
  if(!Array.isArray(arr)) arr = [];
  const out = [];
  for(const u of arr){ out.push(await migrateImageUrl(u)); }
  return JSON.stringify(out);
}

// 목록형 테이블: 새 테이블 비우고 다시 채움 (id 제외)
async function copyList(oldName, newName, cols){
  log('▶ '+oldName+' → '+newName);
  const {data, error} = await OLD.from(oldName).select('*');
  if(error) throw new Error(oldName+' 읽기 실패: '+error.message);
  await NEW.from(newName).delete().neq('id', 0);
  let n=0;
  for(const row of (data||[])){
    const rec = {}; cols.forEach(c=> rec[c]=row[c]);
    const {error:e2} = await NEW.from(newName).insert(rec);
    if(e2) throw new Error(newName+' 쓰기 실패: '+e2.message);
    n++;
  }
  log('   ✔ '+n+'건 이전 완료', 'ok');
}

async function run(){
  const btn=document.getElementById('go'); btn.disabled=true; logEl.innerHTML='';
  try{
    log('=== 데이터 이전 시작 ===');

    // 1) photos (type 기준, 이미지 포함)
    log('▶ photos → imfb_photos');
    {
      const {data, error} = await OLD.from('photos').select('*');
      if(error) throw new Error('photos 읽기 실패: '+error.message);
      let n=0;
      for(const row of (data||[])){
        const newUrls = await migrateUrlsJson(row.urls);
        const {error:e2} = await NEW.from('imfb_photos').upsert({type:row.type, urls:newUrls}, {onConflict:'type'});
        if(e2) throw new Error('imfb_photos 쓰기 실패: '+e2.message);
        n++;
      }
      log('   ✔ '+n+'건 이전 완료 (이미지 포함)', 'ok');
    }

    // 2) 목록형 테이블들
    await copyList('schedule',        'imfb_schedule',        ['date','day','title','speaker','time','location']);
    await copyList('youtube',         'imfb_youtube',         ['url','title']);
    await copyList('worship_youtube', 'imfb_worship_youtube', ['url','title']);
    await copyList('sermon_youtube',  'imfb_sermon_youtube',  ['url','title']);

    // 3) church_info (key 기준)
    log('▶ church_info → imfb_church_info');
    {
      const {data, error} = await OLD.from('church_info').select('*');
      if(error) throw new Error('church_info 읽기 실패: '+error.message);
      let n=0;
      for(const row of (data||[])){
        const {error:e2} = await NEW.from('imfb_church_info').upsert({key:row.key, value:row.value}, {onConflict:'key'});
        if(e2) throw new Error('imfb_church_info 쓰기 실패: '+e2.message);
        n++;
      }
      log('   ✔ '+n+'건 이전 완료', 'ok');
    }

    // 4) kfd_photos (id=1, 이미지 포함)
    log('▶ kfd_photos → imfb_kfd_photos');
    {
      const {data, error} = await OLD.from('kfd_photos').select('*');
      if(error) throw new Error('kfd_photos 읽기 실패: '+error.message);
      let n=0;
      for(const row of (data||[])){
        const newUrls = await migrateUrlsJson(row.urls);
        const {error:e2} = await NEW.from('imfb_kfd_photos').upsert({id:row.id||1, urls:newUrls});
        if(e2) throw new Error('imfb_kfd_photos 쓰기 실패: '+e2.message);
        n++;
      }
      log('   ✔ '+n+'건 이전 완료 (이미지 포함)', 'ok');
    }

    log('');
    log('🎉 모든 데이터 이전 완료! 새 수퍼베이스 테이블을 확인하세요.', 'ok');
    log('이제 사이트가 정상 동작하면 옛 수퍼베이스를 삭제해도 됩니다.', 'ok');
  }catch(e){
    log('');
    log('❌ 오류: '+e.message, 'err');
    log('일부만 이전됐을 수 있습니다. 문제 해결 후 다시 눌러도 안전합니다.', 'err');
  }finally{
    btn.disabled=false;
  }
}
</script>
</body>
</html>
